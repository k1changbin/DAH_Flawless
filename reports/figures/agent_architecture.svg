<svg xmlns="http://www.w3.org/2000/svg" width="780" height="430" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif"><rect width="100%" height="100%" fill="#ffffff"/><text x="30" y="36" font-size="22" fill="#0f172a" font-weight="700">Agent Architecture and Truth Boundary</text><rect x="40" y="84" width="310" height="68" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="54" y="109" font-size="16" fill="#0f172a" font-weight="700">Red Agent</text><text x="54" y="134" font-size="13" fill="#475569">observe tags -&gt; choose attack -&gt; mutate observed</text><rect x="40" y="178" width="310" height="68" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="54" y="203" font-size="16" fill="#0f172a" font-weight="700">Environment</text><text x="54" y="228" font-size="13" fill="#475569">keeps world, applies observed-only mutation</text><rect x="420" y="178" width="310" height="68" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="434" y="203" font-size="16" fill="#0f172a" font-weight="700">Blue Agents</text><text x="434" y="228" font-size="13" fill="#475569">Threat -&gt; Mission -&gt; Planner -&gt; Report</text><rect x="420" y="84" width="310" height="68" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="434" y="109" font-size="16" fill="#0f172a" font-weight="700">Scorer/Admin</text><text x="434" y="134" font-size="13" fill="#475569">compares world and observed, emits winner</text><rect x="230" y="296" width="310" height="68" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="244" y="321" font-size="16" fill="#0f172a" font-weight="700">Hash Log</text><text x="244" y="346" font-size="13" fill="#475569">JSONL evidence with prev_hash / this_hash</text><line x1="195" y1="152" x2="195" y2="178" stroke="#334155" stroke-width="2"/><line x1="350" y1="212" x2="420" y2="212" stroke="#334155" stroke-width="2"/><line x1="575" y1="178" x2="575" y2="152" stroke="#334155" stroke-width="2"/><line x1="420" y1="118" x2="350" y2="118" stroke="#334155" stroke-width="2"/><line x1="350" y1="330" x2="420" y2="246" stroke="#334155" stroke-width="2"/><text x="42" y="390" font-size="14" fill="#475569">Boundary rule: Red and Blue receive redacted observed state. Only Environment and Scorer retain world.</text></svg>