<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif"><rect width="100%" height="100%" fill="#ffffff"/><text x="30" y="36" font-size="22" fill="#0f172a" font-weight="700">Detect / Contain / Recover Evidence</text><text x="30" y="62" font-size="13" fill="#475569">Attack-specific report view; internal Blue detection remains invariant-based.</text><text x="30" y="84" font-size="16" fill="#0f172a" font-weight="700">PRIORITY_POISONING</text><text x="48" y="106" font-size="13" fill="#0f172a">Detect: MISSION_PRIORITY_CHANGED</text><text x="48" y="124" font-size="13" fill="#0f172a">Contain: QUARANTINE_FIELD, REQUEST_REVALIDATION</text><text x="48" y="142" font-size="13" fill="#0f172a">Recover: trusted fallback</text><text x="30" y="176" font-size="16" fill="#0f172a" font-weight="700">TELEMETRY_FDI</text><text x="48" y="198" font-size="13" fill="#0f172a">Detect: BATTERY_ENERGY_IMPOSSIBLE, BATTERY_MOTOR_INCONSISTENT, TELEMETRY_CONFLICT</text><text x="48" y="216" font-size="13" fill="#0f172a">Contain: OBSERVE_DOMAIN, REQUEST_REVALIDATION</text><text x="48" y="234" font-size="13" fill="#0f172a">Recover: hold/revalidate</text><text x="30" y="268" font-size="16" fill="#0f172a" font-weight="700">TIME_DESYNC_REPLAY</text><text x="48" y="290" font-size="13" fill="#0f172a">Detect: REPLAY_SUSPECTED, SEQUENCE_REGRESSION, TIMESTAMP_SKEW</text><text x="48" y="308" font-size="13" fill="#0f172a">Contain: HOLD_COMMAND, REQUEST_REVALIDATION</text><text x="48" y="326" font-size="13" fill="#0f172a">Recover: hold/revalidate</text></svg>