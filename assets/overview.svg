<svg viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" role="img" aria-labelledby="t d">
  <title id="t">DAH 2026 Red vs Blue 자율 공방 시뮬레이션 개요</title>
  <desc id="d">world와 observed를 분리하고 Red가 조작, Blue가 불변식으로 탐지, scorer가 판정, 공진화로 양측이 학습하는 라운드 기반 공방 구조와 3대 차별점, 공격 3종, 채점 결과, 배점 매핑을 한 장으로 요약.</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2f6fed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="900" fill="#ffffff"/>

  <!-- Header -->
  <text x="40" y="50" font-size="30" font-weight="700" fill="#0f172a">DAH 2026 — Red vs Blue 자율 공방 시뮬레이션</text>
  <text x="40" y="82" font-size="17" font-style="italic" fill="#475569">"우리는 네트워크가 아니라 AI의 '믿음'을 방어한다. 그리고 과잉 방어 또한 임무 실패다."</text>
  <line x1="40" y1="100" x2="1240" y2="100" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Legend -->
  <g font-size="13" fill="#334155">
    <rect x="40" y="116" width="14" height="14" rx="3" fill="#efe7fb" stroke="#7c3aed"/><text x="60" y="128">world(진실)</text>
    <rect x="150" y="116" width="14" height="14" rx="3" fill="#fde8e8" stroke="#e23b3b"/><text x="170" y="128">Red(공격)</text>
    <rect x="248" y="116" width="14" height="14" rx="3" fill="#e7eefc" stroke="#2f6fed"/><text x="268" y="128">Blue(방어)</text>
    <rect x="350" y="116" width="14" height="14" rx="3" fill="#e6f6ec" stroke="#1f9d55"/><text x="370" y="128">scorer(심판)</text>
  </g>

  <!-- ===== Pipeline ===== -->
  <text x="40" y="172" font-size="15" font-weight="700" fill="#64748b">라운드 루프 (매 라운드 반복)</text>

  <!-- world -->
  <rect x="40" y="200" width="190" height="110" rx="12" fill="#efe7fb" stroke="#7c3aed" stroke-width="2"/>
  <text x="135" y="240" font-size="17" font-weight="700" fill="#5b21b6" text-anchor="middle">① world (진실)</text>
  <text x="135" y="266" font-size="13" fill="#4c1d95" text-anchor="middle">battery 20% / motor FAULT</text>
  <text x="135" y="288" font-size="12" fill="#6d28d9" text-anchor="middle">Red·Blue는 직접 못 봄</text>

  <!-- Red -->
  <rect x="290" y="200" width="190" height="110" rx="12" fill="#fde8e8" stroke="#e23b3b" stroke-width="2"/>
  <text x="385" y="240" font-size="17" font-weight="700" fill="#b91c1c" text-anchor="middle">② Red Agent</text>
  <text x="385" y="266" font-size="13" fill="#7f1d1d" text-anchor="middle">observed만 조작</text>
  <text x="385" y="288" font-size="12" fill="#b91c1c" text-anchor="middle">가중치로 공격 선택 → battery 82%</text>

  <!-- redact -->
  <rect x="540" y="200" width="150" height="110" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="615" y="248" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">③ redact</text>
  <text x="615" y="272" font-size="13" fill="#475569" text-anchor="middle">world 제거</text>

  <!-- Blue -->
  <rect x="750" y="200" width="230" height="110" rx="12" fill="#e7eefc" stroke="#2f6fed" stroke-width="2"/>
  <text x="865" y="234" font-size="16" font-weight="700" fill="#1d4ed8" text-anchor="middle">④ Blue 4-Agent</text>
  <text x="865" y="258" font-size="12.5" fill="#1e3a8a" text-anchor="middle">Threat · Mission · Planner · Report</text>
  <text x="865" y="280" font-size="12.5" fill="#1e3a8a" text-anchor="middle">불변식 위반 탐지 → 격리 → 복구</text>
  <text x="865" y="300" font-size="11.5" fill="#2563eb" text-anchor="middle">방어 큐: 슬롯 제한·레이턴시·신뢰예산 소모</text>

  <!-- scorer -->
  <rect x="1040" y="200" width="200" height="110" rx="12" fill="#e6f6ec" stroke="#1f9d55" stroke-width="2"/>
  <text x="1140" y="240" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">⑤ scorer (심판)</text>
  <text x="1140" y="266" font-size="12.5" fill="#14532d" text-anchor="middle">world ↔ observed 비교</text>
  <text x="1140" y="288" font-size="12.5" fill="#166534" text-anchor="middle">승패 판정</text>

  <!-- pipeline arrows -->
  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#ar)">
    <line x1="232" y1="255" x2="286" y2="255"/>
    <line x1="482" y1="255" x2="536" y2="255"/>
    <line x1="692" y1="255" x2="746" y2="255"/>
    <line x1="982" y1="255" x2="1036" y2="255"/>
  </g>

  <!-- world -> scorer dashed (truth only to scorer) -->
  <path d="M135 200 C 135 140, 1140 140, 1140 200" stroke="#7c3aed" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <text x="640" y="134" font-size="13" fill="#7c3aed" text-anchor="middle">진실(world)은 오직 scorer만 접근 → 채점의 객관성 보장</text>

  <!-- Blue can't see world callout -->
  <text x="615" y="335" font-size="12.5" font-weight="700" fill="#2f6fed" text-anchor="middle">★ Blue는 world(정답)를 못 본다 — 내부 모순(불변식)만으로 추론</text>

  <!-- co-evolution feedback arc: scorer -> Red -->
  <path d="M1140 310 C 1140 410, 385 410, 385 312" stroke="#2f6fed" stroke-width="2.5" fill="none" marker-end="url(#arb)"/>
  <text x="760" y="400" font-size="13.5" font-weight="700" fill="#1d4ed8" text-anchor="middle">공진화: 성공/실패 피드백 → Red 가중치(통한 공격↑/막힌 공격↓) · Blue 임계값(오탐 둔감/놓침 민감)</text>

  <line x1="40" y1="438" x2="1240" y2="438" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== Three cards ===== -->
  <!-- Card A: differentiators -->
  <rect x="40" y="458" width="385" height="210" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="490" font-size="17" font-weight="700" fill="#0f172a">3대 차별점</text>
  <text x="60" y="522" font-size="14" fill="#334155">① 데이터 신뢰 방어</text>
  <text x="78" y="543" font-size="12.5" fill="#64748b">값이 아니라 신뢰도·정합성을 방어</text>
  <text x="60" y="572" font-size="14" fill="#334155">② 공진화 (군비경쟁)</text>
  <text x="78" y="593" font-size="12.5" fill="#64748b">Red·Blue가 서로 보고 학습 → 대표 그래프</text>
  <text x="60" y="622" font-size="14" fill="#334155">③ 피로스의 승리</text>
  <text x="78" y="643" font-size="12.5" fill="#64748b">과방어로 가용성 고갈 시 Red 소모 승리</text>

  <!-- Card B: 3 attacks -->
  <rect x="448" y="458" width="385" height="210" rx="12" fill="#fef6f6" stroke="#f1b0b0" stroke-width="1.5"/>
  <text x="468" y="490" font-size="17" font-weight="700" fill="#b91c1c">공격 3종 (Must · 깊게 구현)</text>
  <text x="468" y="524" font-size="14" fill="#7f1d1d">PRIORITY_POISONING</text>
  <text x="486" y="545" font-size="12.5" fill="#9a3412">임무 우선순위 점수 오염 → 표적 오선택</text>
  <text x="468" y="574" font-size="14" fill="#7f1d1d">TELEMETRY_FDI</text>
  <text x="486" y="595" font-size="12.5" fill="#9a3412">배터리·모터 거짓 보고 → 상태 오판</text>
  <text x="468" y="624" font-size="14" fill="#7f1d1d">TIME_DESYNC_REPLAY</text>
  <text x="486" y="645" font-size="12.5" fill="#9a3412">시퀀스·시간 조작 → 과거 명령 재처리</text>

  <!-- Card C: scoring outcomes -->
  <rect x="856" y="458" width="384" height="210" rx="12" fill="#f3f9f5" stroke="#a7d7b8" stroke-width="1.5"/>
  <text x="876" y="490" font-size="17" font-weight="700" fill="#15803d">채점 결과 (scorer 판정)</text>
  <text x="876" y="522" font-size="13.5" fill="#7f1d1d">RED_BREACH — 침투 승리(탐지 실패)</text>
  <text x="876" y="550" font-size="13.5" fill="#7f1d1d">RED_ATTRITION — 소모 승리(과방어)</text>
  <text x="876" y="578" font-size="13.5" fill="#1d4ed8">BLUE — 막고 임무도 지킴</text>
  <text x="876" y="606" font-size="13.5" fill="#1d4ed8">BLUE_RECOVERY — 마비 복구 성공</text>
  <text x="876" y="634" font-size="13.5" fill="#64748b">DRAW — 무승부</text>
  <text x="876" y="658" font-size="11.5" fill="#15803d">seed 고정 → 동일 입력=동일 로그(재현)</text>

  <!-- ===== Rubric strip ===== -->
  <text x="40" y="708" font-size="15" font-weight="700" fill="#64748b">공식 보고서 8항목 ↔ 구현 증거 (총 100점)</text>
  <g font-size="13">
    <rect x="40" y="722" width="220" height="120" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="60" y="750" font-size="20" font-weight="700" fill="#c2410c">④ 30</text>
    <text x="60" y="774" font-size="13.5" fill="#9a3412" font-weight="700">공격 시나리오</text>
    <text x="60" y="798" font-size="12" fill="#7c2d12">운용 서사 + 8필드</text>
    <text x="60" y="818" font-size="12" fill="#7c2d12">+ 조작 데이터 로그</text>

    <rect x="285" y="722" width="220" height="120" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="305" y="750" font-size="20" font-weight="700" fill="#1d4ed8">⑤ 25</text>
    <text x="305" y="774" font-size="13.5" fill="#1e40af" font-weight="700">방어 아키텍처</text>
    <text x="305" y="798" font-size="12" fill="#1e3a8a">불변식 + Detect/</text>
    <text x="305" y="818" font-size="12" fill="#1e3a8a">Contain/Recover</text>

    <rect x="530" y="722" width="220" height="120" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="550" y="750" font-size="20" font-weight="700" fill="#1d4ed8">⑥ 25</text>
    <text x="550" y="774" font-size="13.5" fill="#1e40af" font-weight="700">AI 에이전트</text>
    <text x="550" y="798" font-size="12" fill="#1e3a8a">협력 다이어그램</text>
    <text x="550" y="818" font-size="12" fill="#1e3a8a">+ 공진화 그래프</text>

    <rect x="775" y="722" width="220" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="795" y="750" font-size="20" font-weight="700" fill="#475569">③ 10</text>
    <text x="795" y="774" font-size="13.5" fill="#334155" font-weight="700">팀 역량</text>
    <text x="795" y="798" font-size="12" fill="#475569">전문성 ↔ 코드</text>
    <text x="795" y="818" font-size="12" fill="#475569">소유권 매핑</text>

    <rect x="1020" y="722" width="220" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="1040" y="750" font-size="20" font-weight="700" fill="#475569">⑧ 10</text>
    <text x="1040" y="774" font-size="13.5" fill="#334155" font-weight="700">문서 완성도</text>
    <text x="1040" y="798" font-size="12" fill="#475569">8항목·출처·재현</text>
    <text x="1040" y="818" font-size="12" fill="#475569">+ 제출 체크</text>
  </g>

  <text x="40" y="878" font-size="12.5" fill="#94a3b8">전체 설계: docs/DAH2026_MASTER_PLANNING.md · 쉬운 설명: docs/DAH2026_쉬운설명_팀원용.md</text>
</svg>
